<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escáner · Maravillas del Mediterráneo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1220">
    <meta name="robots" content="noindex">

    <link rel="stylesheet" href="admin.css?v=1.0">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="shell" id="shell">
        <div class="topbar">
            <div class="topbar__title">
                <span class="topbar__logo"></span>
                <div><h1>Escáner de ingreso</h1><span>Maravillas del Mediterráneo</span></div>
            </div>
        </div>

        <div class="card scanner">
            <div id="reader"></div>
            <p class="scan-hint">Apuntá la cámara al QR de la credencial. El escaneo es automático.</p>
            <div class="scan-result" id="result" role="status" aria-live="assertive">
                <div class="res-icon" id="resIcon"></div>
                <p class="res-name" id="resName"></p>
                <p class="res-msg" id="resMsg"></p>
                <p class="res-code" id="resCode"></p>
            </div>
            <p class="scan-count">Asistencias registradas: <strong id="count">0</strong></p>
        </div>
    </div>

    <script src="escaner.js"></script>
</body>
</html>
