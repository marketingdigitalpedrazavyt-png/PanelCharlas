server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS interno de Docker: resuelve el backend en cada request (runtime),
    # NO al arrancar. Así nginx no se cae con "host not found in upstream" si
    # el backend todavía no levantó; cuando el backend esté listo, se conecta solo.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API → contenedor backend (mismo origen para el navegador, sin CORS)
    location /api/ {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:4000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 5m;
    }

    # SPA: cualquier ruta cae en index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache de assets con hash
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
